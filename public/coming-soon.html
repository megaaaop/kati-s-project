<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เร็วๆ นี้ · ระบบยื่นใบลา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card text-center">
      <div style="font-size:42px">🚧</div>
      <h1>หน้าสำหรับบทบาทนี้กำลังพัฒนา</h1>
      <p class="sub">สวัสดี <span id="roleName" class="fw-semibold"></span></p>
      <p class="muted">ตอนนี้ระบบเปิดใช้งานเฉพาะส่วนของ <b>นักเรียน</b> (ยื่นใบลา + ติดตามสถานะ)
        ส่วนของครู/แอดมิน/ผู้ปกครอง จะเปิดในเฟสถัดไป</p>
      <button class="btn btn-brand w-100 mt-2" onclick="logout()">ออกจากระบบ</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      const user = await requireAuth(); // เข้าได้ทุกบทบาท ขอแค่ล็อกอิน
      if (!user) return;
      document.getElementById('roleName').textContent = user.full_name + ' (' + user.role + ')';
    })();
  </script>
</body>
</html>
