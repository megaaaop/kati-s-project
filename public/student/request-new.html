<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ยื่นใบลา · ระบบยื่นใบลา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg brand-gradient navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/student/dashboard.html">📋 ระบบยื่นใบลา</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/student/dashboard.html">หน้าหลัก</a></li>
          <li class="nav-item"><a class="nav-link active" href="/student/request-new.html">ยื่นใบลา</a></li>
          <li class="nav-item"><a class="nav-link" href="/student/my-requests.html">คำขอของฉัน</a></li>
        </ul>
        <span class="navbar-text text-white me-3">👤 <span id="userName"></span></span>
        <button class="btn btn-light btn-sm" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <h2 class="mb-3">📝 ยื่นใบลา / ขาดเรียน</h2>

    <div class="card">
      <div class="card-body p-4">
        <div id="error" class="alert alert-danger d-none" role="alert"></div>

        <form id="requestForm" novalidate>
          <div class="mb-3">
            <label class="form-label">ประเภทการลา</label>
            <select name="leave_type" class="form-select" required>
              <option value="" selected disabled>— เลือกประเภท —</option>
              <option value="sick">ลาป่วย</option>
              <option value="personal">ลากิจ</option>
              <option value="activity">ลากิจกรรม</option>
            </select>
          </div>

          <div class="row g-3">
            <div class="col-sm-6 mb-3">
              <label class="form-label">วันที่เริ่มลา</label>
              <input type="date" name="start_date" class="form-control" required>
            </div>
            <div class="col-sm-6 mb-3">
              <label class="form-label">วันที่สิ้นสุด</label>
              <input type="date" name="end_date" class="form-control" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">เหตุผล</label>
            <textarea name="reason" class="form-control" rows="4" required placeholder="ระบุเหตุผลการลา"></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label">แนบหลักฐาน <span class="muted small">(ถ้ามี — รูป JPG/PNG หรือ PDF ไม่เกิน 5MB)</span></label>
            <input type="file" name="evidence" class="form-control" accept="image/jpeg,image/png,application/pdf">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-brand">ส่งคำขอ</button>
            <a href="/student/dashboard.html" class="btn btn-outline-secondary">ยกเลิก</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/request-new.js"></script>
</body>
</html>
