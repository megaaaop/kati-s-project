<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าหลักนักเรียน · ระบบยื่นใบลา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="appnav"></div>
  <div class="page-wrap">
    <h2 class="mb-1">สวัสดี <span id="welcomeName"></span> 👋</h2>
    <p class="muted mb-4">ยินดีต้อนรับเข้าสู่ระบบยื่นเอกสารลา/ขาดเรียนออนไลน์</p>
    <div class="row g-3">
      <div class="col-sm-6">
        <a class="tile" href="/student/request-new.html">
          <div class="ico">📝</div><h3>ยื่นใบลา</h3>
          <p>กรอกแบบฟอร์มขอลา/ขาดเรียน ระบุประเภท วันที่ และเหตุผล</p>
        </a>
      </div>
      <div class="col-sm-6">
        <a class="tile" href="/student/my-requests.html">
          <div class="ico">📂</div><h3>คำขอของฉัน</h3>
          <p>ติดตามสถานะตามสายอนุมัติ 4 ขั้น และดูประวัติย้อนหลัง</p>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/display.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      const user = await requireAuth(['student']);
      if (!user) return;
      renderNav(user, 'home');
      document.getElementById('welcomeName').textContent = user.full_name;
    })();
  </script>
</body>
</html>
