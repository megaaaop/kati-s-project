<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สถิติการลา · ระบบยื่นใบลา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="appnav"></div>
  <div class="page-wrap" style="max-width:1040px">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">📊 สถิติการลา</h2>
      <button class="btn btn-outline-secondary btn-sm" onclick="downloadFile('/api/requests/export.csv','leave-requests.csv')">⬇️ Export CSV</button>
    </div>

    <div id="cards" class="row g-3 mb-4"></div>

    <div class="row g-3">
      <div class="col-md-5"><div class="card h-100"><div class="card-body">
        <h6 class="mb-3">ตามประเภทการลา</h6><canvas id="typeChart" height="200"></canvas>
      </div></div></div>
      <div class="col-md-7"><div class="card h-100"><div class="card-body">
        <h6 class="mb-3">ตามเดือน (จำนวนคำขอ)</h6><canvas id="monthChart" height="200"></canvas>
      </div></div></div>
      <div class="col-md-7"><div class="card h-100"><div class="card-body">
        <h6 class="mb-3">ตามระดับชั้น</h6><canvas id="gradeChart" height="200"></canvas>
      </div></div></div>
      <div class="col-md-5"><div class="card h-100"><div class="card-body">
        <h6 class="mb-3">นักเรียนที่ลาบ่อย (สูงสุด 10)</h6>
        <div id="topStudents" class="small"></div>
      </div></div></div>
    </div>
    <div id="err"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/display.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/stats.js"></script>
</body>
</html>
