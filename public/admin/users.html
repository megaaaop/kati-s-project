<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการผู้ใช้ · แอดมิน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="appnav"></div>
  <div class="page-wrap" style="max-width:1040px">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">🛠️ จัดการผู้ใช้</h2>
      <button class="btn btn-brand btn-sm" data-bs-toggle="collapse" data-bs-target="#createBox">+ เพิ่มผู้ใช้</button>
    </div>

    <div class="collapse mb-3" id="createBox">
      <div class="card"><div class="card-body">
        <div id="createErr" class="alert alert-danger d-none"></div>
        <form id="createForm" class="row g-2">
          <div class="col-md-4"><input class="form-control" name="full_name" placeholder="ชื่อ-นามสกุล" required></div>
          <div class="col-md-4"><input class="form-control" name="email" type="email" placeholder="อีเมล" required></div>
          <div class="col-md-4"><input class="form-control" name="password" type="password" placeholder="รหัสผ่าน (≥6)" required></div>
          <div class="col-md-4">
            <select class="form-select" name="role" id="cRole" required>
              <option value="student">นักเรียน</option>
              <option value="parent">ผู้ปกครอง</option>
              <option value="homeroom">ครูประจำชั้น</option>
              <option value="gradehead">ครูหัวหน้าระดับ</option><option value="dormhead">หัวหน้าฝ่ายหอพัก</option>
              <option value="deputy">รองผอ</option>
              <option value="principal">ผอ</option>
              <option value="admin">แอดมิน</option>
            </select>
          </div>
          <div class="col-md-4"><input class="form-control" name="student_id" id="cStudentId" placeholder="รหัสนักเรียน (นักเรียน)"></div>
          <div class="col-md-4"><input class="form-control" name="class_room" id="cClass" placeholder="ห้อง เช่น ม.5/2 (นักเรียน)"></div>
          <div class="col-md-4"><input class="form-control" name="grade_level" id="cGrade" placeholder="ระดับที่ดูแล เช่น ม.5 หรือ ทุกระดับ"></div>
          <div class="col-12"><button class="btn btn-brand btn-sm" type="submit">บันทึก</button></div>
        </form>
      </div></div>
    </div>

    <div class="card"><div class="card-body p-2">
      <div class="table-responsive">
        <table class="table table-sm mb-0">
          <thead><tr><th>ชื่อ / อีเมล</th><th>บทบาท</th><th>ห้อง/ระดับ</th><th>ครูประจำชั้น</th><th>ผู้ปกครอง</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div></div>
  </div>

  <!-- Edit modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">แก้ไขผู้ใช้</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="editErr" class="alert alert-danger d-none"></div>
          <input type="hidden" id="eId">
          <div class="mb-2"><label class="form-label">ชื่อ</label><input class="form-control" id="eName"></div>
          <div class="mb-2"><label class="form-label">อีเมล</label><input class="form-control" id="eEmail" type="email"></div>
          <div class="mb-2"><label class="form-label">รหัสผ่านใหม่ <span class="muted small">(เว้นว่าง = ไม่เปลี่ยน, ≥6 ตัว)</span></label><input class="form-control" id="ePassword" type="text" autocomplete="new-password" placeholder="เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยน"></div>
          <div class="mb-2"><label class="form-label">บทบาท</label>
            <select class="form-select" id="eRole">
              <option value="student">นักเรียน</option><option value="parent">ผู้ปกครอง</option>
              <option value="homeroom">ครูประจำชั้น</option><option value="gradehead">ครูหัวหน้าระดับ</option><option value="dormhead">หัวหน้าฝ่ายหอพัก</option>
              <option value="deputy">รองผอ</option><option value="principal">ผอ</option><option value="admin">แอดมิน</option>
            </select>
          </div>
          <div class="mb-2"><label class="form-label">รหัสนักเรียน (สำหรับนักเรียน)</label><input class="form-control" id="eStudentId"></div>
          <div class="mb-2"><label class="form-label">ห้อง (นักเรียน)</label><input class="form-control" id="eClass"></div>
          <div class="mb-2"><label class="form-label">ระดับชั้น / ที่ดูแล</label><input class="form-control" id="eGrade" placeholder="เช่น ม.5 หรือ ทุกระดับ"></div>
          <div class="mb-2"><label class="form-label">ครูประจำชั้น (สำหรับนักเรียน)</label><select class="form-select" id="eAdvisor"></select></div>
          <div class="mb-2"><label class="form-label">ผู้ปกครอง (สำหรับนักเรียน)</label><select class="form-select" id="eParent"></select></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button><button class="btn btn-brand" onclick="saveEdit()">บันทึก</button></div>
      </div>
    </div>
  </div>

  <script src="/vendor/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/display.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin-users.js"></script>
</body>
</html>
