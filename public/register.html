<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก · ระบบยื่นใบลา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>สมัครสมาชิก</h1>
      <p class="sub">สร้างบัญชีเพื่อเริ่มใช้งานระบบ</p>

      <div id="error" class="alert alert-danger d-none" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label">ชื่อ-นามสกุล</label>
          <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">อีเมล</label>
          <input type="email" name="email" class="form-control" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">รหัสผ่าน <span class="muted small">(อย่างน้อย 6 ตัวอักษร)</span></label>
          <input type="password" name="password" class="form-control" required minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">บทบาท</label>
          <select id="role" name="role" class="form-select" required>
            <option value="student">นักเรียน</option>
            <option value="parent">ผู้ปกครอง</option>
            <option value="homeroom">ครูประจำชั้น</option>
            <option value="gradehead">ครูหัวหน้าระดับ</option>
            <option value="dormhead">หัวหน้าฝ่ายหอพัก</option>
            <option value="deputy">รองผอ</option>
            <option value="principal">ผอ</option>
            <option value="admin">ผู้ดูแลระบบ</option>
          </select>
          <div class="form-text">นักเรียน/ผู้ปกครองสมัครได้เลย — ครู/ผู้บริหาร/แอดมินต้องใช้รหัสลับ</div>
        </div>

        <div id="gradeField" style="display:none">
          <div class="mb-3">
            <label class="form-label">ระดับชั้นที่ดูแล</label>
            <input type="text" name="grade_level" class="form-control" placeholder="เช่น ม.5 หรือ ทุกระดับ">
            <div class="form-text">หัวหน้าระดับใส่ระดับชั้นที่รับผิดชอบ · รองผอ/ผอ ใส่ "ทุกระดับ" ได้</div>
          </div>
        </div>

        <div id="staffFields" style="display:none">
          <div class="mb-3">
            <label class="form-label">รหัสลับสำหรับครู/ผู้บริหาร</label>
            <input type="password" name="staff_code" class="form-control" autocomplete="off">
            <div class="form-text">ขอรหัสนี้จากผู้ดูแลระบบ</div>
          </div>
        </div>

        <div id="studentFields">
          <div class="mb-3">
            <label class="form-label">รหัสนักเรียน</label>
            <input type="text" name="student_id" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">ห้องเรียน</label>
            <input type="text" name="class_room" class="form-control" placeholder="เช่น ม.5/2">
          </div>
        </div>

        <button type="submit" class="btn btn-brand w-100">สมัครสมาชิก</button>
      </form>

      <p class="text-center mt-3 mb-0 small">มีบัญชีอยู่แล้ว? <a href="/login.html">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
